<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Intimissimi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f1923;color:#fff;min-height:100vh}
.header{background:#1a2a3a;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #2a4a6a}
.header h1{font-size:17px;color:#4fc3f7}
#scan-count{font-size:12px;color:#888}
.scan-area{padding:14px 16px}
.input-row{display:flex;gap:8px;margin-bottom:10px}
#barcodeInput{flex:1;padding:12px 14px;font-size:16px;border:2px solid #2a4a6a;border-radius:8px;background:#1a2a3a;color:#fff;outline:none}
#barcodeInput:focus{border-color:#4fc3f7}
#searchBtn{padding:12px 16px;background:#4fc3f7;color:#0f1923;border:none;border-radius:8px;font-weight:bold;font-size:14px;cursor:pointer}
.cam-btn{width:100%;padding:11px;background:#1a3a2a;color:#4caf50;border:1px solid #4caf50;border-radius:8px;font-size:14px;cursor:pointer;margin-bottom:10px;font-weight:bold}
.cam-btn.stop{background:#c0392b;color:#fff;border-color:#c0392b}
#status{text-align:center;font-size:12px;color:#4fc3f7;padding:3px 0 8px;min-height:18px}
#video-wrap{display:none;position:relative;width:100%;border-radius:10px;overflow:hidden;margin-bottom:10px;background:#000}
#video{width:100%;display:block}
.aim-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80%;height:120px;border:2px solid #4fc3f7;border-radius:6px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45)}
#result{display:none;border-radius:10px;overflow:hidden;margin-bottom:12px}
.res-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px}
.res-hdr.ok{background:#1a3a2a}.res-hdr.fail{background:#3a1a1a}
.badge{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;flex-shrink:0}
.badge.ok{background:#4caf50;color:#fff}.badge.fail{background:#e74c3c;color:#fff}
.res-title{font-size:15px;font-weight:bold}
.res-sub{font-size:12px;color:#aaa;margin-top:2px}
.info-row{background:#1a2a3a;padding:8px 14px;display:flex;justify-content:space-between;border-top:1px solid #0f1923;font-size:13px}
.info-row .lbl{color:#888}.info-row .val{color:#4fc3f7;font-weight:bold}
.surt-wrap{background:#1a2a3a;padding:10px 14px;border-top:1px solid #0f1923}
.surt-title{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.surt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.sc{border-radius:6px;padding:7px 4px;text-align:center}
.sc.on{background:#0d2a1a;border:1px solid #4caf50}
.sc.off{background:#1a1a2a;border:1px solid #333;opacity:.4}
.sc .sn{font-size:10px;color:#aaa}.sc.on .sn{color:#4caf50}
.sc .sq{font-size:22px;font-weight:bold}.sc.on .sq{color:#4caf50}.sc.off .sq{color:#555}
.hist-hdr{font-size:11px;color:#555;padding:6px 16px 3px;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.hist-hdr button{background:none;border:1px solid #333;color:#666;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer}
.hist-list{padding:0 16px 60px}
.hi{background:#1a2a3a;border-radius:7px;padding:9px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.hi .hbc{font-size:13px}.hi .hss{font-size:11px;color:#4fc3f7;margin-top:2px}
.hi .ht{font-size:11px;color:#555;flex-shrink:0;margin-left:8px}
.hi.miss .hbc{color:#e74c3c}.hi.miss .hss{color:#e74c3c}
</style>
</head>
<body>
<div class="header">
  <h1>📦 Intimissimi Scanner</h1>
  <span id="scan-count">0 escaneados</span>
</div>
<div class="scan-area">
  <div class="input-row">
    <input type="text" id="barcodeInput" placeholder="Escanear o escribir código..."
           autofocus autocomplete="off" inputmode="numeric"
           onkeydown="if(event.key==='Enter')doLookup()">
    <button id="searchBtn" onclick="doLookup()">OK</button>
  </div>
  <button class="cam-btn" id="camBtn" onclick="toggleCam()">📷 Activar cámara</button>
  <div id="status"></div>
  <div id="video-wrap">
    <video id="video" playsinline autoplay muted></video>
    <div class="aim-box"></div>
  </div>
  <div id="result"></div>
</div>
<div class="hist-hdr">
  <span>Historial</span>
  <button onclick="clearHist()">Limpiar</button>
</div>
<div class="hist-list" id="hist"></div>

let count=0, hist=[], camOn=false, stream=null;
let lastCode='', lastTime=0;
let codeReader=null;

function doLookup(){
  const inp=document.getElementById('barcodeInput');
  const bc=inp.value.trim();
  if(!bc)return;
  processCode(bc);
  inp.value='';
  inp.focus();
}

function processCode(bc){
  const now=Date.now();
  if(bc===lastCode && now-lastTime<2000)return;
  lastCode=bc; lastTime=now;
  count++;
  document.getElementById('scan-count').textContent=count+' escaneados';
  const entry=DATA[bc];
  showResult(bc, entry);
  addHist(bc, entry);
  if(navigator.vibrate) navigator.vibrate(entry && Object.keys(entry.s).length ? 60 : [100,50,100]);
}

function showResult(bc, entry){
  const res=document.getElementById('result');
  res.style.display='block';
  if(!entry || !Object.keys(entry.s).length){
    res.innerHTML=`<div class="res-hdr fail"><span class="badge fail">✗</span><div><div class="res-title">${bc}</div><div class="res-sub" style="color:#e74c3c">No encontrado en ningún surtido</div></div></div>`;
    return;
  }
  const total=Object.values(entry.s).reduce((a,b)=>a+b,0);
  const n=Object.keys(entry.s).length;
  const cards=SURTIDOS.map(s=>{
    const q=entry.s[String(s)];
    return `<div class="sc ${q?'on':'off'}"><div class="sn">${String(s).slice(-3)}</div><div class="sq">${q||'—'}</div></div>`;
  }).join('');
  res.innerHTML=`
    <div class="res-hdr ok"><span class="badge ok">✓</span><div><div class="res-title">${bc}</div><div class="res-sub">${total} uds · ${n} surtido(s)</div></div></div>
    <div class="info-row"><span class="lbl">📍 Ubicación</span><span class="val">${entry.u}</span></div>
    <div class="info-row"><span class="lbl">📦 Caja</span><span class="val">${entry.c}</span></div>
    <div class="surt-wrap"><div class="surt-title">Distribución por surtido</div><div class="surt-grid">${cards}</div></div>`;
}

function addHist(bc, entry){
  const ok=entry && Object.keys(entry.s).length>0;
  const summ=ok ? Object.entries(entry.s).map(([s,q])=>`${String(s).slice(-3)}:${q}`).join(' | ') : 'No encontrado';
  hist.unshift({bc, summ, ok, t: new Date().toTimeString().slice(0,5)});
  if(hist.length>80) hist.pop();
  renderHist();
}
function renderHist(){
  document.getElementById('hist').innerHTML=hist.map(h=>`
    <div class="hi ${h.ok?'':'miss'}">
      <div><div class="hbc">${h.bc}</div><div class="hss">${h.summ}</div></div>
      <div class="ht">${h.t}</div>
    </div>`).join('');
}
function clearHist(){
  hist=[]; count=0;
  document.getElementById('scan-count').textContent='0 escaneados';
  document.getElementById('hist').innerHTML='';
  document.getElementById('result').style.display='none';
}

// ---- CAMERA ----
async function toggleCam(){
  if(camOn){ stopCam(); return; }
  const btn=document.getElementById('camBtn');
  const status=document.getElementById('status');
  btn.textContent='⏳ Cargando...';
  btn.disabled=true;
  status.textContent='';
  try{
    // Load ZXing
    const zxing = await import('https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.4/esm/index.min.js');
    const hints = new Map();
    // EAN-13 and EAN-8 are most common for retail
    hints.set(2, [1, 2, 3, 4, 8, 11, 12, 13, 14, 15]); // DecodeHintType.POSSIBLE_FORMATS
    codeReader = new zxing.BrowserMultiFormatReader(hints);
    
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} }
    });
    
    const video=document.getElementById('video');
    video.srcObject=stream;
    document.getElementById('video-wrap').style.display='block';
    btn.textContent='⏹ Detener cámara';
    btn.classList.add('stop');
    btn.disabled=false;
    camOn=true;
    status.textContent='Apuntá el código al recuadro azul';

    // Use decodeFromStream for continuous scanning
    codeReader.decodeFromStream(stream, video, (result, err) => {
      if(result){
        const code = result.getText();
        if(code) processCode(code);
      }
    });

  } catch(e){
    btn.textContent='📷 Activar cámara';
    btn.classList.remove('stop');
    btn.disabled=false;
    if(e.name==='NotAllowedError'){
      status.textContent='⚠️ Permiso de cámara denegado. Tocá el candado en la barra del navegador y habilitá la cámara.';
    } else {
      status.textContent='Error: '+e.message;
    }
  }
}

function stopCam(){
  if(codeReader) codeReader.reset();
  if(stream) stream.getTracks().forEach(t=>t.stop());
  camOn=false; stream=null; codeReader=null;
  document.getElementById('video-wrap').style.display='none';
  const btn=document.getElementById('camBtn');
  btn.textContent='📷 Activar cámara';
  btn.classList.remove('stop');
  document.getElementById('status').textContent='';
}

window.onload=()=>document.getElementById('barcodeInput').focus();
