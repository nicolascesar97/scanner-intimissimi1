<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scanner Intimissimi</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f1923; color: #fff; min-height: 100vh; }

.header {
  background: #1a2a3a;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid #2a4a6a;
}
.header h1 { font-size: 18px; color: #4fc3f7; }
.header span { font-size: 12px; color: #888; }

.scan-area {
  padding: 16px;
}

/* Manual input */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
#barcodeInput {
  flex: 1;
  padding: 12px 14px;
  font-size: 16px;
  border: 2px solid #2a4a6a;
  border-radius: 8px;
  background: #1a2a3a;
  color: #fff;
  outline: none;
}
#barcodeInput:focus { border-color: #4fc3f7; }
#scanBtn {
  padding: 12px 16px;
  background: #4fc3f7;
  color: #0f1923;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
}
#scanBtn:active { background: #29b6f6; }

/* Camera toggle */
.cam-btn {
  width: 100%;
  padding: 10px;
  background: #1a3a2a;
  color: #4caf50;
  border: 1px solid #4caf50;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 12px;
}

/* Camera viewport */
#scanner-container {
  display: none;
  position: relative;
  width: 100%;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 12px;
  background: #000;
}
#scanner-container video {
  width: 100%;
  display: block;
}
#scanner-container canvas.drawingBuffer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}
.scan-line {
  position: absolute;
  top: 50%;
  left: 5%;
  width: 90%;
  height: 2px;
  background: rgba(79, 195, 247, 0.8);
  box-shadow: 0 0 8px #4fc3f7;
  animation: scan 2s infinite;
  z-index: 10;
}
@keyframes scan {
  0%, 100% { top: 30%; }
  50% { top: 70%; }
}

/* Result */
#result {
  display: none;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 12px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.result-header {
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.result-header.found { background: #1a3a2a; }
.result-header.notfound { background: #3a1a1a; }
.result-barcode { font-size: 13px; color: #aaa; }
.result-barcode strong { color: #fff; font-size: 15px; }

.info-row {
  background: #1a2a3a;
  padding: 8px 14px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  border-top: 1px solid #0f1923;
}
.info-row .label { color: #888; }
.info-row .value { color: #4fc3f7; font-weight: bold; }

.surtidos-grid {
  background: #1a2a3a;
  padding: 10px 14px;
  border-top: 1px solid #0f1923;
}
.surtidos-grid .grid-title {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.surtidos-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.surt-card {
  border-radius: 6px;
  padding: 6px 4px;
  text-align: center;
}
.surt-card.active {
  background: #0d2a1a;
  border: 1px solid #4caf50;
}
.surt-card.inactive {
  background: #1a1a2a;
  border: 1px solid #333;
  opacity: 0.4;
}
.surt-card .surt-num { font-size: 11px; color: #aaa; }
.surt-card.active .surt-num { color: #4caf50; }
.surt-card .surt-qty { font-size: 20px; font-weight: bold; color: #fff; }
.surt-card.active .surt-qty { color: #4caf50; }

/* History */
.history-title {
  font-size: 12px;
  color: #666;
  padding: 8px 16px 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.history-list { padding: 0 16px 80px; }
.history-item {
  background: #1a2a3a;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}
.history-item .bc { color: #aaa; }
.history-item .surt-summary { color: #4fc3f7; font-size: 12px; }
.history-item .time { color: #555; font-size: 11px; }
.history-item.miss { opacity: 0.5; }

/* Clear button */
.clear-btn {
  position: fixed;
  bottom: 20px;
  right: 16px;
  background: #c0392b;
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.badge { 
  display: inline-block;
  background: #4caf50;
  color: #0f1923;
  border-radius: 50%;
  width: 22px; height: 22px;
  font-size: 12px;
  font-weight: bold;
  text-align: center;
  line-height: 22px;
}
.badge.miss { background: #e74c3c; }

#status-bar {
  text-align: center;
  font-size: 12px;
  color: #4fc3f7;
  padding: 4px 0 8px;
}
</style>
</head>
<body>

<div class="header">
  <h1>📦 Intimissimi Scanner</h1>
  <span id="scan-count">0 escaneados</span>
</div>

<div class="scan-area">
  <div class="input-row">
    <input type="text" id="barcodeInput" placeholder="Escanear o escribir código..." 
           autofocus autocomplete="off" inputmode="numeric"
           onkeydown="if(event.key==='Enter') lookupBarcode()">
    <button id="scanBtn" onclick="lookupBarcode()">Buscar</button>
  </div>

  <button class="cam-btn" onclick="toggleCamera()" id="camBtn">
    📷 Activar cámara
  </button>
  <div id="status-bar"></div>

  <div id="scanner-container">
    <div class="scan-line"></div>
  </div>

  <div id="result"></div>
</div>

<div class="history-title">Historial</div>
<div class="history-list" id="history"></div>

<button class="clear-btn" onclick="clearHistory()" title="Limpiar historial">🗑</button>

let scanCount = 0;
let history = [];
let cameraActive = false;
let lastScanned = '';
let lastScannedTime = 0;

function lookupBarcode() {
  const input = document.getElementById('barcodeInput');
  const bc = input.value.trim();
  if (!bc) return;
  processBarcode(bc);
  input.value = '';
  input.focus();
}

function processBarcode(bc) {
  const now = Date.now();
  // Debounce: ignore same code scanned within 2 seconds
  if (bc === lastScanned && now - lastScannedTime < 2000) return;
  lastScanned = bc;
  lastScannedTime = now;

  scanCount++;
  document.getElementById('scan-count').textContent = scanCount + ' escaneados';

  const entry = DATA[bc];
  const resultDiv = document.getElementById('result');
  resultDiv.style.display = 'block';

  if (!entry || Object.keys(entry.surtidos).length === 0) {
    resultDiv.innerHTML = `
      <div class="result-header notfound">
        <span class="badge miss">✗</span>
        <div>
          <div class="result-barcode">Código: <strong>${bc}</strong></div>
          <div style="color:#e74c3c;font-size:13px;margin-top:2px;">No encontrado en ningún surtido</div>
        </div>
      </div>`;
    addHistory(bc, null, null, null);
    vibrate([100, 50, 100]);
    return;
  }

  const surtidosActivos = entry.surtidos;
  const totalUds = Object.values(surtidosActivos).reduce((a,b) => a+b, 0);
  const surtList = Object.keys(surtidosActivos).map(s => `${s.slice(-3)}:${surtidosActivos[s]}`).join(' | ');

  let cards = SURTIDOS.map(s => {
    const qty = surtidosActivos[String(s)];
    const active = qty && qty > 0;
    return `<div class="surt-card ${active ? 'active' : 'inactive'}">
      <div class="surt-num">${String(s).slice(-3)}</div>
      <div class="surt-qty">${active ? qty : '—'}</div>
    </div>`;
  }).join('');

  resultDiv.innerHTML = `
    <div class="result-header found">
      <span class="badge">✓</span>
      <div>
        <div class="result-barcode">Código: <strong>${bc}</strong></div>
        <div style="color:#4caf50;font-size:13px;margin-top:2px;">${totalUds} unidades en ${Object.keys(surtidosActivos).length} surtido(s)</div>
      </div>
    </div>
    <div class="info-row">
      <span class="label">📍 Ubicación</span>
      <span class="value">${entry.ubicacion}</span>
    </div>
    <div class="info-row">
      <span class="label">📦 Caja</span>
      <span class="value">${entry.caja}</span>
    </div>
    <div class="surtidos-grid">
      <div class="grid-title">Distribución por surtido (últimos 3 dígitos)</div>
      <div class="surtidos-cards">${cards}</div>
    </div>`;

  addHistory(bc, entry.ubicacion, entry.caja, surtList);
  vibrate([50]);
}

function addHistory(bc, ubicacion, caja, surtList) {
  const now = new Date();
  const time = now.toTimeString().slice(0, 5);
  history.unshift({ bc, ubicacion, caja, surtList, time, found: !!surtList });
  if (history.length > 50) history.pop();
  renderHistory();
}

function renderHistory() {
  const div = document.getElementById('history');
  div.innerHTML = history.map(h => `
    <div class="history-item ${h.found ? '' : 'miss'}">
      <div>
        <div class="bc">${h.bc}</div>
        <div class="surt-summary">${h.found ? h.surtList : 'No encontrado'}</div>
      </div>
      <div class="time">${h.time}</div>
    </div>`).join('');
}

function clearHistory() {
  if (confirm('¿Limpiar historial?')) {
    history = [];
    scanCount = 0;
    document.getElementById('scan-count').textContent = '0 escaneados';
    document.getElementById('history').innerHTML = '';
    document.getElementById('result').style.display = 'none';
  }
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// Camera / Quagga
function toggleCamera() {
  if (cameraActive) {
    stopCamera();
  } else {
    startCamera();
  }
}

function startCamera() {
  const container = document.getElementById('scanner-container');
  container.style.display = 'block';
  document.getElementById('status-bar').textContent = 'Iniciando cámara...';
  document.getElementById('camBtn').textContent = '⏹ Detener cámara';

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: container,
      constraints: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
    },
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'code_128_reader', 'code_39_reader']
    },
    locate: true
  }, function(err) {
    if (err) {
      document.getElementById('status-bar').textContent = 'Error de cámara: ' + err.message;
      container.style.display = 'none';
      document.getElementById('camBtn').textContent = '📷 Activar cámara';
      return;
    }
    Quagga.start();
    cameraActive = true;
    document.getElementById('status-bar').textContent = 'Cámara activa — apuntá al código';
  });

  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    if (code) {
      processBarcode(code);
    }
  });
}

function stopCamera() {
  Quagga.stop();
  cameraActive = false;
  document.getElementById('scanner-container').style.display = 'none';
  document.getElementById('camBtn').textContent = '📷 Activar cámara';
  document.getElementById('status-bar').textContent = '';
}

// Auto-focus input on load
window.onload = () => document.getElementById('barcodeInput').focus();
</script>
